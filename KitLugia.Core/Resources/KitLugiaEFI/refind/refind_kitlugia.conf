#
# refind.conf — KitLugia Custom rEFInd Configuration
# 
# This config is used when deploying KitLugia on systems where
# the stock rEFInd (non-forked) is used. If using the KitLugia
# rEFInd fork, the KitLugia entry is built-in and this config
# is optional (can still be used for theme customization).
#
# Deploy to: ESP/EFI/refind/refind.conf
#

timeout         10
hideui          hints,label,badges,banner
dont_scan_files refind_x64.efi,bootmgfw.original.efi,mmx64.efi,grubx64.efi,shellx64.efi,BOOTX64.EFI
dont_scan_volumes "SYSTEM","RECOVERY"
showtools       shell,memtest,gdisk,mok_tool,about,reboot,shutdown,firmware

# ---- KitLugia Tool Entry ----
# (KitLugia is built-in if using KitLugia rEFInd fork)
# For non-forked rEFInd, uncomment below:
#menuentry "KitLugia Recovery" {
#    icon     /EFI/refind/icons/os_kitlugia.png
#    loader   /EFI/KitLugia/kitlugia_shrink.efi
#    ostype   Linux
#}

# ---- Windows Fallback ----
menuentry "Windows" {
    loader   /EFI/Microsoft/Boot/bootmgfw.efi
    ostype   Windows
    volume   "ESP"
}

# ---- Theme ----
#icons_dir /EFI/refind/kitlugia_theme
#banner   /EFI/refind/kitlugia_theme/banner.png
#banner_scale fillscreen
#selection_small /EFI/refind/kitlugia_theme/selection_small.png
#selection_big   /EFI/refind/kitlugia_theme/selection_big.png
